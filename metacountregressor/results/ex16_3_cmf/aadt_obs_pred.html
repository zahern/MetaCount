// Band shape helper
function bandShape(x0, x1, color) {
  return {
    type: 'rect', xref: 'x', yref: 'paper',
    x0: x0, x1: x1, y0: 0, y1: 1,
    fillcolor: color, opacity: 0.08, line: { width: 0 }
  };
}

  bandShape(D.laadt_p10, D.laadt_p25, '#0a6c74'),

];

  x: D.log_aadt, y: D.y_true,

function bandShape(x0, x1, color) {
